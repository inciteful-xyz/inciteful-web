<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="description"
    content="Using citations to find the most relevant literature. Committed to open access, Inciteful uses the power of graph analysis to help you explore and find the most relevant academic literature." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
  <meta name="theme-color" content="#7c3aed" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico">

  <!-- Default title - will be replaced by Vue -->
  <title>Inciteful | Using Citations to Explore Academic Literature</title>

  <!-- Open Graph default tags - will be enhanced by Vue components -->
  <meta property="og:site_name" content="Inciteful" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card default -->
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Preconnect to external APIs for faster loading -->
  <link rel="preconnect" href="https://api.inciteful.xyz" crossorigin>
  <link rel="preconnect" href="https://api.openalex.org" crossorigin>
  <link rel="dns-prefetch" href="https://api.inciteful.xyz">
  <link rel="dns-prefetch" href="https://api.openalex.org">
</head>

<body id="body" class="bg-white text-gray-600">
  <noscript>
    <strong>We're sorry but Inciteful doesn't work properly without JavaScript enabled.
      Please enable it to continue. Test</strong>
  </noscript>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
